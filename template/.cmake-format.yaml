format:
  line_width: 100
  tab_size: 2
  use_tabchars: false
  line_ending: unix
  command_case: lower
  keyword_case: unchanged
  dangle_parens: true
  dangle_align: prefix
  separate_ctrl_name_with_space: false
  separate_fn_name_with_space: false
  max_subgroups_hwrap: 2
  max_pargs_hwrap: 6
  max_lines_hwrap: 2
  always_wrap: []
  enable_sort: true
markup:
  bullet_char: "*"
  enum_char: "."
  first_comment_is_literal: false
lint:
  disabled_codes:
    - C0301
