name: Release
on:
  push:
    branches: [main]
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
  sbom:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/sbom
        with:
          tag: ${{ needs.release.outputs.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
  sync-to-dev:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - uses: ./.github/actions/sync-release
      - uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          base: dev
          branch: chore/sync-release
          title: "chore: sync release ${{ needs.release.outputs.tag_name }} to dev"
          commit-message: "chore: sync release ${{ needs.release.outputs.tag_name }} to dev"
          body: |
            Syncs version.txt, CHANGELOG.md and the release-please manifest from
            main into dev after release ${{ needs.release.outputs.tag_name }}.
