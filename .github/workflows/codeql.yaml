name: CodeQL
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: "0 9 * * 1" # every Monday at 9:00 UTC
permissions:
  contents: read
  security-events: write
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"
