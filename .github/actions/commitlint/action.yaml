name: Commitlint
description: Lint commit messages in the PR range against Conventional Commits.
runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-nix
    - shell: bash
      env:
        FROM: ${{ github.event.pull_request.base.sha }}
        TO: ${{ github.event.pull_request.head.sha }}
      run: bash ${{ github.action_path }}/commitlint.sh
